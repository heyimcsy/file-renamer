name: Build installers

# main 브랜치에 푸시하거나, v로 시작하는 태그를 밀거나, 수동 실행 시 빌드.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: renamer

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: renamer/src-tauri

      - name: Install frontend deps
        run: npm install

      - name: Build app (.app/.dmg on macOS, .msi/.exe on Windows)
        run: npm run tauri build

      # 빌드 결과물(설치본)을 Actions 실행 화면에서 내려받을 수 있게 업로드.
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: renamer-${{ matrix.name }}
          if-no-files-found: ignore
          path: |
            renamer/src-tauri/target/release/bundle/msi/*.msi
            renamer/src-tauri/target/release/bundle/nsis/*.exe
            renamer/src-tauri/target/release/bundle/dmg/*.dmg
