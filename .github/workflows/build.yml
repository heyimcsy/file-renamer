name: Build installers

# main 푸시/수동 실행 → 빌드만.
# v로 시작하는 태그(v1.0.0 등) 푸시 → 빌드 후 Release 페이지에 설치본 자동 첨부.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: renamer

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: renamer/src-tauri

      - name: Install frontend deps
        run: npm install

      - name: Build app (.app/.dmg on macOS, .msi/.exe on Windows)
        run: npm run tauri build
        env:
          # 아래 Secrets 가 채워지면 macOS 빌드가 자동으로 서명+공증됩니다.
          # (비어 있으면 지금처럼 미서명으로 빌드 — Windows 는 이 값들을 무시)
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # 실행 화면 하단 Artifacts 에서도 받을 수 있게 업로드.
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: renamer-${{ matrix.name }}
          if-no-files-found: ignore
          path: |
            renamer/src-tauri/target/release/bundle/msi/*.msi
            renamer/src-tauri/target/release/bundle/nsis/*.exe
            renamer/src-tauri/target/release/bundle/dmg/*.dmg

  # 태그 푸시 시에만: 위에서 만든 설치본을 모아 Release 페이지에 첨부.
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          fail_on_unmatched_files: false
